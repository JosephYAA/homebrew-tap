name: Autobump casks

on:
  schedule:
    - cron: "30 3 * * *" # daily, ~03:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.BUMP_APP_ID }}
          private-key: ${{ secrets.BUMP_APP_PRIVATE_KEY }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@675fcd27b59e54d310c5484c8c27c01d03da660c

      - name: Configure git identity as the App
        uses: Homebrew/actions/git-user-config@675fcd27b59e54d310c5484c8c27c01d03da660c
        with:
          username: ${{ steps.app-token.outputs.app-slug }}[bot]
          token: ${{ steps.app-token.outputs.token }}

      - name: Trust custom tap
        run: brew trust josephyaa/tap

      - name: Bump outdated casks
        uses: Homebrew/actions/bump-packages@675fcd27b59e54d310c5484c8c27c01d03da660c
        with:
          token: ${{ steps.app-token.outputs.token }}
          casks: raycast@beta
          fork: false
